<!DOCTYPE html>
<html>
<head>
    <title>Titanic Survival Predictor</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 8px; margin: 5px 0 15px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; font-size: 16px; }
        #result { margin-top: 20px; padding: 15px; border-radius: 5px; text-align: center; font-size: 20px; display: none; }
        .survived { background: #d4edda; color: #155724; }
        .died { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>🚢 Titanic Survival Predictor</h2>

    <label>Класс (1, 2, 3):</label>
    <input type="number" id="Pclass" value="1" min="1" max="3">

    <label>Пол (0 = мужской, 1 = женский):</label>
    <input type="number" id="Sex" value="1" min="0" max="1">

    <label>Возраст:</label>
    <input type="number" id="Age" value="28">

    <label>SibSp (братья/сёстры/супруги):</label>
    <input type="number" id="SibSp" value="0">

    <label>Parch (родители/дети):</label>
    <input type="number" id="Parch" value="0">

    <label>Fare (цена билета):</label>
    <input type="number" id="Fare" value="100">

    <label>Embarked (0=S, 1=C, 2=Q):</label>
    <input type="number" id="Embarked" value="1">

    <button onclick="predict()">Предсказать</button>

    <div id="result"></div>

    <script>
        async function predict() {
            const SibSp = parseInt(document.getElementById('SibSp').value);
            const Parch = parseInt(document.getElementById('Parch').value);

            const data = {
                Pclass:     parseInt(document.getElementById('Pclass').value),
                Sex:        parseInt(document.getElementById('Sex').value),
                Age:        parseFloat(document.getElementById('Age').value),
                SibSp:      SibSp,
                Parch:      Parch,
                Fare:       parseFloat(document.getElementById('Fare').value),
                Embarked:   parseInt(document.getElementById('Embarked').value),
                FamilySize: SibSp + Parch + 1,
                IsAlone:    (SibSp + Parch === 0) ? 1 : 0
            };

            const response = await fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            const div = document.getElementById('result');
            div.style.display = 'block';

            if (result.survival_prediction === 1) {
                div.className = 'survived';
                div.innerHTML = '✅ Выжил';
            } else {
                div.className = 'died';
                div.innerHTML = '❌ Погиб';
            }
        }
    </script>
</body>
</html>
